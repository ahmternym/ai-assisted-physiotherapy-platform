<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FizyoBul – Türkiye Fizyoterapi Platformu</title>

    <!-- Leaflet CSS — haritanın tile'larını ve marker'larını doğru çizmek için zorunlu -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""
    />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f0f4ff;
        color: #1e293b;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      /* Leaflet tile container yükseklik fix */
      .leaflet-container {
        font-family: 'Segoe UI', system-ui, sans-serif !important;
      }

      /* Özel il tooltip stili */
      .city-tooltip {
        background: #1e3a5f !important;
        color: white !important;
        border: none !important;
        border-radius: 8px !important;
        font-weight: 600 !important;
        font-size: 12px !important;
        padding: 4px 10px !important;
        box-shadow: 0 2px 8px rgba(0,0,0,0.25) !important;
        white-space: nowrap !important;
      }
      .city-tooltip::before { display: none !important; }

      /* Zoom butonları */
      .leaflet-control-zoom {
        border: none !important;
        box-shadow: 0 2px 12px rgba(0,0,0,0.15) !important;
        border-radius: 10px !important;
        overflow: hidden;
      }
      .leaflet-control-zoom a {
        color: #1e3a5f !important;
        font-weight: 700 !important;
        border: none !important;
      }
      .leaflet-control-zoom a:hover {
        background: #eff6ff !important;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!-- Leaflet JS — body kapanmadan ÖNCE yüklenmeli ki window.L hazır olsun -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  </body>
</html>
